# Deployment Configuration

# Target Devices
targets:
  - name: raspberry_pi
    processor: ARM
    memory_mb: 2048
    storage_mb: 32768
    accelerator: null  # coral_tpu
  
  - name: jetson_nano
    processor: ARM64
    memory_mb: 4096
    storage_mb: 16384
    accelerator: gpu  # NVIDIA GPU
  
  - name: mobile
    processor: ARM64
    memory_mb: 3000
    storage_mb: 100
    accelerator: null

# Model Export Settings
export:
  formats: [onnx, tflite]
  quantization: true
  quantization_type: int8  # int8, float16, dynamic
  optimize_for_inference: true
  dynamic_axes: true

# Inference Settings
inference:
  batch_size: 1
  num_threads: 4
  use_gpu: false
  fallback_to_cpu: true
  allow_fp16: true

# Performance Targets
performance_targets:
  min_fps: 15
  max_latency_ms: 100
  max_model_size_mb: 50
  max_memory_mb: 500

# Post-Processing
post_processing:
  nms_enabled: true
  nms_threshold: 0.45
  confidence_threshold: 0.5
  max_detections: 300

# Logging
logging:
  level: INFO
  save_logs: true
  log_dir: 'logs/deployment'
